name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_DARPAN_API_BASE_URL: ${{ vars.VITE_DARPAN_API_BASE_URL }}
      VITE_DARPAN_RPC_URL: ${{ vars.VITE_DARPAN_RPC_URL }}
      VITE_DARPAN_LINEAR_ROADMAP_URL: ${{ vars.VITE_DARPAN_LINEAR_ROADMAP_URL }}
      VITE_DARPAN_LINEAR_REQUEST_URL: ${{ vars.VITE_DARPAN_LINEAR_REQUEST_URL }}
      VITE_DARPAN_LINEAR_EMBED_ENABLED: ${{ vars.VITE_DARPAN_LINEAR_EMBED_ENABLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Report pilot backend target configuration
        run: |
          if [ -n "$VITE_DARPAN_RPC_URL" ]; then
            echo "Using configured VITE_DARPAN_RPC_URL for this Pages build."
          elif [ -n "$VITE_DARPAN_API_BASE_URL" ]; then
            echo "Using configured VITE_DARPAN_API_BASE_URL for this Pages build."
          else
            echo "::warning::GitHub Pages build has no backend RPC target configured. The deployed Pages URL will default to same-origin /rpc/json and is not sufficient for release-week auth or cookie validation by itself."
          fi

      - name: Build site
        run: npm run build-only -- --base "/${{ github.event.repository.name }}/"

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
